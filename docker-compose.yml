version: "3"

services:
  pad:
    image: pad
    container_name: pad
    restart: unless-stopped
    user: "1000:1000"
    volumes:
      - ./images:/app/images
      - ./config.yaml:/app/config.yaml
      - ./token:/app/.token
      - ./.tmp:/app/.tmp
    environment:
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - LOG_LEVEL=INFO

networks:
  default:
